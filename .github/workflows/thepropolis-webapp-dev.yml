# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More  GitHub Actions for Azure: https://github.com/Azure/actions
name: Build and deploy container app to Azure Web App - thepropolis-webapp-frontend-dev

on:
  push:
    branches:
      - propolis-v1-next-js
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'
    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to registry
      uses: docker/login-action@v3
      with:
        registry: https://thpropoliscontainerregistry.azurecr.io/
        username: ${{ secrets.ACR_USERNAME_DEV }}
        password: ${{ secrets.ACR_PASSWORD_DEV }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v6
      with:
        push: true
        tags: thpropoliscontainerregistry.azurecr.io/${{ secrets.ACR_USERNAME_DEV }}/latest:${{ github.sha }}
        file: ./Dockerfile
        build-args: |
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'thepropolis-webapp-dev'
        publish-profile: ${{ secrets.WEBAPP_PUBLISH_PROFILE_DEV }}
        images: 'thpropoliscontainerregistry.azurecr.io/${{ secrets.ACR_USERNAME_DEV }}/latest:${{ github.sha }}'
